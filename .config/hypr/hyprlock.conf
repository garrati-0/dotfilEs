# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRLOCK — M3 EXPRESSIVE SQUARICLES × NORD PALETTE          ║
# ╚══════════════════════════════════════════════════════════════╝

background {
    monitor =
    path = /home/garrati/pictures/wallpaper.png
    color = rgba(46, 52, 64, 1.0) # Nord Polar Night
    blur_passes = 3
    blur_size = 5
    brightness = 0.40
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OROLOGIO — Più Grande (Squaricles M3)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Blocco Ore
shape {
    monitor =
    size = 230, 230
    color = rgba(191, 97, 106, 1.0) # Nord Aurora Red
    rounding = 32
    position = -125, 180
    halign = center
    valign = center
}
# Testo Ore (spostato leggermente in giù per centrarlo alla baseline)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H')"
    color = rgba(46, 52, 64, 1.0)
    font_size = 115
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = -125, 172 
    halign = center
    valign = center
}

# Blocco Minuti
shape {
    monitor =
    size = 230, 230
    color = rgba(67, 76, 94, 1.0) # Nord Polar Night
    rounding = 32
    position = 125, 180
    halign = center
    valign = center
}
# Testo Minuti (spostato in giù)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"
    color = rgba(216, 222, 233, 1.0)
    font_size = 115
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 125, 172
    halign = center
    valign = center
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DATA E MESE — M3 Title Large
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor =
    text = cmd[update:60000] echo "$(LC_TIME=it_IT.UTF-8 date +'%A, %d %B')"
    color = rgba(216, 222, 233, 0.9) # Bianco/Grigio Nord
    font_size = 24
    font_family = Product Sans Medium
    position = 0, 0
    halign = center
    valign = center
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# NOME UTENTE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor =
    text =    $USER
    color = rgba(216, 222, 233, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -140
    halign = center
    valign = center
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# INPUT PASSWORD (Centrato)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
input-field {
    monitor =
    size = 300, 75
    outline_thickness = 0
    rounding = 20
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(76, 86, 106, 0.90)
    font_color = rgba(236, 239, 244, 1.0)
    check_color = rgba(136, 192, 208, 1.0)
    fail_color = rgba(191, 97, 106, 1.0)
    capslock_color = rgba(235, 203, 139, 1.0)

    fade_on_empty = false
    placeholder_text = <span foreground="##d8dee9" font_family="JetBrainsMono Nerd Font" font_weight="bold">󰌾  Password...</span>
    hide_input = false
    
    # Portando la X a 0 si centra perfettamente
    position = 0, -220
    halign = center
    valign = center
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BATTERIA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
label {
    monitor =
    # Legge dinamicamente la percentuale della batteria ogni 30 secondi
    text = cmd[update:30000] echo "󰁹 $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)%"
    color = rgba(216, 222, 233, 0.6)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 40
    halign = center
    valign = bottom
}
