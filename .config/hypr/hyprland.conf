# #######################################################################################
#  CONFIGURAZIONE HYPRLAND - LENOVO YOGA SLIM 7 PRO X (NVIDIA EDITION)
# #######################################################################################

# --- MONITOR (PC a Sinistra, Schermo a Destra) ---
monitor=eDP-2,3072x1920@120,0x0,2
monitor=,1920x1080@120,auto,1


# --- VARIABILI D'AMBIENTE (NVIDIA/AMD HYBRID) ---
# Se riscontri problemi con i driver Nvidia, de-commenta le righe sottostanti
# env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true
}

# --- AVVIO AUTOMATICO ---
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mkdir -p ~/Immagini/Schermate
exec-once = hyprpaper
exec-once = swaync
exec-once = waybar
exec-once = hypridle
exec-once = swayosd-server
exec-once = swww-daemon

# --- INPUT ---
input {
    kb_layout = it
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }

    sensitivity = 0 
}

# --- GESTURE (SINTASSI HYPRLAND 0.51+) ---
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.5 
}
# Nuova regola per scorrere i workspace con 3 dita:
gesture = 3, horizontal, workspace


# --- ESTETICA ---
general {
    gaps_in = 8
    gaps_out = 15
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 18
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(00000088)
    }
}

# --- ANIMAZIONI ---
animations {
    enabled = true
    bezier = fluent, 0.1, 1, 0.1, 1
    animation = windows, 1, 4, fluent, slide
    animation = windowsOut, 1, 4, fluent, slide
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, fluent, slide
    animation = specialWorkspace, 1, 5, fluent, slidevert
}

# --- REGOLE FINESTRE / ROFI (SINTASSI HYPRLAND 0.53+) ---
windowrule {
    name = regola_rofi
    match:class = Rofi
    float = on
    center = on
    stay_focused = on
    pin = on
}

windowrule {
    name = regola_kitty
    match:class = ^(kitty)$
    opacity = 0.95 0.90
}

windowrule {
    name = regola_audio
    match:class = ^(pavucontrol)$
    float = on
}

windowrule = match:class ^(org\.gnome\.Nautilus)$, opacity 0.85 0.85


# --- KEYBINDINGS ---
$mainMod = SUPER

# Audio (SwayOSD)
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Microfono
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Luminosità (SwayOSD)
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Applicazioni e Menu
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, D, exec, ~/.config/rofi/scripts/rofi-file-search.sh
bind = $mainMod, G, exec, ~/.config/rofi/scripts/rofi-web-search.sh
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, Q, killactive,

# Schermo Intero e Floating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, A, fullscreen, 1
bind = $mainMod, T, togglefloating, active

# Gestione Special Workspace (Scratchpad)
bind = $mainMod, W, movetoworkspacesilent, special
bind = ALT, Tab, togglespecialworkspace, special

# Reload rapido
bind = $mainMod SHIFT, R, exec, hyprctl reload

# 1. SWITCH WORKSPACES (ALT + Numero)
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# 2. SPOSTA IN WORKSPACE (ALT + SHIFT + Numero)
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# --- SCREENSHOT (Salva in Immagini/Schermate + Copia negli appunti) ---
# Comando unico per Print e Win+S
$screenshot = grim -g "$(slurp)" - | tee ~/Immagini/Schermate/$(date +'%Y-%m-%d_%H%M%S').png | wl-copy && notify-send "Screenshot catturato" "Area salvata in Schermate e copiata negli appunti"

bind = , Print, exec, $screenshot
bind = $mainMod, S, exec, $screenshot

# Gestione Focus e Movimento Finestre
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Sposta finestra su altro monitor
bind = $mainMod ALT, right, movewindow, mon:+1
bind = $mainMod ALT, left, movewindow, mon:-1

# Ridimensionamento
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
